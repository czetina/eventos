{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Editar nota" %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body p-4">
        <h4 class="mb-3"><i class="bi bi-pencil"></i> {% trans "Editar nota" %}</h4>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-dark">{% trans "Guardar" %}</button>
          <a href="{% url 'notes:list' event.pk %}" class="btn btn-link">{% trans "Cancelar" %}</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
