{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Mi perfil" %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h4 class="mb-3"><i class="bi bi-person-circle"></i> {% trans "Mi perfil" %}</h4>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-dark">{% trans "Guardar" %}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
